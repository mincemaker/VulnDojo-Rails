services:
  web:
    build:
      context: .
      target: development
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - sqlite_storage:/rails/storage
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      VULN_CHALLENGES: ${VULN_CHALLENGES:-}
      TZ: ${TZ:-Asia/Tokyo}
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
  sqlite_storage:
