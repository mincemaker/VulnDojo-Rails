services:
  web:
    build:
      context: .
      target: development
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - sqlite_storage:/rails/storage
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      VULN_CHALLENGES: ${VULN_CHALLENGES:-}
      TZ: ${TZ:-Asia/Tokyo}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    stdin_open: true
    tty: true

  redis:
    image: docker.io/library/redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    volumes:
      - redis_data:/data

volumes:
  bundle_cache:
  sqlite_storage:
  redis_data:
